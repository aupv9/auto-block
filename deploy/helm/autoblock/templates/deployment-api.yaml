{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "autoblock.fullname" . }}-api
  labels:
    {{- include "autoblock.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "autoblock.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "autoblock.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "autoblock.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: {{ include "autoblock.image" .Values.api.image }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
          env:
            - name: AUTOBLOCK_CONFIG
              value: /etc/autoblock/autoblock.yaml
            - name: AUTOBLOCK_API_AUTH_KEYS_0_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-secrets" (include "autoblock.fullname" .)) .Values.auth.existingSecret }}
                  key: AUTOBLOCK_API_AUTH_KEYS_0_KEY
            - name: AUTOBLOCK_API_AUTH_KEYS_0_ROLE
              value: admin
          livenessProbe:
            httpGet:
              path: /api/v1/status/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/status/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/autoblock
              readOnly: true
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "autoblock.fullname" . }}-config
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
