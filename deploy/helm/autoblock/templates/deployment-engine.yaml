{{- if .Values.engine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "autoblock.fullname" . }}-engine
  labels:
    {{- include "autoblock.labels" . | nindent 4 }}
    app.kubernetes.io/component: engine
spec:
  replicas: {{ .Values.engine.replicaCount }}
  selector:
    matchLabels:
      {{- include "autoblock.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: engine
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "autoblock.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: engine
    spec:
      serviceAccountName: {{ include "autoblock.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: engine
          image: {{ include "autoblock.image" .Values.engine.image }}
          imagePullPolicy: {{ .Values.engine.image.pullPolicy }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: AUTOBLOCK_CONFIG
              value: /etc/autoblock/autoblock.yaml
            - name: AUTOBLOCK_NOTIFICATIONS_SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-secrets" (include "autoblock.fullname" .)) .Values.auth.existingSecret }}
                  key: AUTOBLOCK_NOTIFICATIONS_SLACK_WEBHOOK_URL
                  optional: true
            {{- if .Values.waf.providers.aws.enabled }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-secrets" (include "autoblock.fullname" .)) .Values.auth.existingSecret }}
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-secrets" (include "autoblock.fullname" .)) .Values.auth.existingSecret }}
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.waf.providers.aws.region | quote }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/autoblock
              readOnly: true
          resources: {{- toYaml .Values.engine.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "autoblock.fullname" . }}-config
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
