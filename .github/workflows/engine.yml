name: Go Engine & API

on:
  push:
    paths:
      - "engine/**"
      - ".github/workflows/engine.yml"
  pull_request:
    paths:
      - "engine/**"

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository_owner }}/autoblock

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.22", "1.23"]

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: engine

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: engine/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: engine
          version: latest

      - name: Test
        run: go test -v -race -count=1 ./...
        env:
          REDIS_URL: redis://localhost:6379

      - name: Build binaries
        run: |
          go build -o /dev/null ./cmd/engine
          go build -o /dev/null ./cmd/api

  docker:
    name: Build & push Docker images
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata (engine)
        id: meta-engine
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-engine

      - name: Build & push engine
        uses: docker/build-push-action@v6
        with:
          context: engine
          target: engine
          push: true
          tags: ${{ steps.meta-engine.outputs.tags }}
          labels: ${{ steps.meta-engine.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (api)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-api

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: engine
          target: api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
