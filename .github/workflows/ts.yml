name: TypeScript SDK

on:
  push:
    paths:
      - "packages/core/**"
      - "packages/express/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/ts.yml"
  pull_request:
    paths:
      - "packages/core/**"
      - "packages/express/**"

jobs:
  test:
    name: Test (${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter "@autoblock/*" exec tsc --noEmit

      - name: Test @autoblock/core
        run: pnpm --filter @autoblock/core test --reporter=verbose
        env:
          REDIS_URL: redis://localhost:6379

      - name: Test @autoblock/express
        run: pnpm --filter @autoblock/express test --reporter=verbose
        env:
          REDIS_URL: redis://localhost:6379

      - name: Build
        run: pnpm --filter "@autoblock/*" build

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write   # for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter "@autoblock/*" build

      - name: Publish @autoblock/core (if version bumped)
        run: pnpm --filter @autoblock/core publish --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true   # skip if version already published

      - name: Publish @autoblock/express (if version bumped)
        run: pnpm --filter @autoblock/express publish --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true
