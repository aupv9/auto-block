[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "autoblock"
version = "0.1.0"
description = "Adaptive rate limiting & auto-remediation middleware for FastAPI / Starlette"
requires-python = ">=3.11"
dependencies = [
    "redis[hiredis]>=5.0.0",
    "starlette>=0.27.0",
    "pydantic>=2.0.0",
    "opentelemetry-api>=1.20.0",
]

[project.optional-dependencies]
dev = [
    "fastapi>=0.110.0",
    "httpx>=0.27.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "testcontainers[redis]>=4.4.0",
    "uvicorn>=0.29.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["autoblock"]
